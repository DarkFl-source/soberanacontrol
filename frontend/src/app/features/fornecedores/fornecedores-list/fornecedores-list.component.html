<!-- Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm" (click)="closeModal()">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 p-6" (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center mb-5">
      <h3 class="text-lg font-bold text-slate-800">Novo Fornecedor</h3>
      <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div *ngIf="errorMessage" class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5">{{ errorMessage }}</div>
    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Razão Social *</label>
        <input [(ngModel)]="novoFornecedor.razaoSocial" type="text" placeholder="Ex: Votorantim Cimentos S.A."
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">CNPJ *</label>
        <input [(ngModel)]="novoFornecedor.cnpj" type="text" placeholder="00.000.000/0001-00"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Contato</label>
        <input [(ngModel)]="novoFornecedor.contato" type="text" placeholder="Nome - (11) 99999-9999"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Endereço</label>
        <input [(ngModel)]="novoFornecedor.endereco" type="text" placeholder="Ex: Av. Paulista, 1000 - São Paulo, SP"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
      <button (click)="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800">Cancelar</button>
      <button (click)="salvar()" [disabled]="isSaving"
        class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors disabled:opacity-60 flex items-center gap-2">
        <svg *ngIf="isSaving" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        {{ isSaving ? 'Salvando...' : 'Salvar Fornecedor' }}
      </button>
    </div>
  </div>
</div>

<!-- Page -->
<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Fornecedores</h2>
      <p class="text-slate-500 text-sm mt-1">Gerencie os fornecedores cadastrados</p>
    </div>
    <button (click)="openModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Novo Fornecedor
    </button>
  </div>
  <div class="border rounded-lg overflow-hidden">
    <table class="w-full text-left text-sm text-slate-600">
      <thead class="bg-slate-50 text-slate-700 border-b">
        <tr>
          <th class="px-4 py-3 font-medium">Razão Social</th>
          <th class="px-4 py-3 font-medium">CNPJ</th>
          <th class="px-4 py-3 font-medium">Contato</th>
          <th class="px-4 py-3 font-medium text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        <tr *ngIf="isLoading"><td colspan="4" class="px-4 py-10 text-center text-slate-400">Carregando...</td></tr>
        <tr *ngIf="!isLoading && fornecedores.length === 0"><td colspan="4" class="px-4 py-10 text-center text-slate-400">Nenhum fornecedor cadastrado.</td></tr>
        <tr *ngFor="let forn of fornecedores" class="hover:bg-slate-50 transition-colors">
          <td class="px-4 py-3 font-medium text-slate-800">{{ forn.razaoSocial }}</td>
          <td class="px-4 py-3">{{ forn.cnpj }}</td>
          <td class="px-4 py-3 text-slate-500">{{ forn.contato || '—' }}</td>
          <td class="px-4 py-3 text-right"><button class="text-blue-600 hover:underline text-sm font-medium">Detalhes</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
