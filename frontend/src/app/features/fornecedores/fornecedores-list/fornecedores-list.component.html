<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Fornecedores</h2>
      <p class="text-slate-500 text-sm mt-1">Gerencie os fornecedores cadastrados</p>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
      + Novo Fornecedor
    </button>
  </div>
  
  <div class="border rounded-lg overflow-hidden">
    <table class="w-full text-left text-sm text-slate-600">
      <thead class="bg-slate-50 text-slate-700 border-b">
        <tr>
          <th class="px-4 py-3 font-medium">Razão Social</th>
          <th class="px-4 py-3 font-medium">CNPJ</th>
          <th class="px-4 py-3 font-medium">Contato</th>
          <th class="px-4 py-3 font-medium text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        <tr *ngIf="isLoading">
          <td colspan="4" class="px-4 py-8 text-center text-slate-500">
            Carregando fornecedores...
          </td>
        </tr>
        <tr *ngIf="!isLoading && fornecedores.length === 0">
          <td colspan="4" class="px-4 py-8 text-center text-slate-500">
            Nenhum fornecedor encontrado.
          </td>
        </tr>
        <tr *ngFor="let forn of fornecedores" class="hover:bg-slate-50 transition-colors">
          <td class="px-4 py-3 font-medium text-slate-800">{{ forn.razaoSocial }}</td>
          <td class="px-4 py-3">{{ forn.cnpj }}</td>
          <td class="px-4 py-3 text-slate-500">{{ forn.contato }}</td>
          <td class="px-4 py-3 text-right">
            <button class="text-blue-600 hover:underline text-sm font-medium">Ver Detalhes</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
