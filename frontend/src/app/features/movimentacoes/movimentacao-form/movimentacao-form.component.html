<div class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
    <!-- Overlay -->
    <div class="fixed inset-0 bg-slate-900 bg-opacity-75 transition-opacity" aria-hidden="true" (click)="onClose.emit()"></div>

    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

    <!-- Modal Content -->
    <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full animate-fade-in">
      <div class="bg-white px-6 pt-6 pb-4 sm:p-8 sm:pb-4">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-xl font-bold text-slate-900 font-display" id="modal-title">Nova Movimentação</h3>
          <button (click)="onClose.emit()" class="text-slate-400 hover:text-slate-600 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <form [formGroup]="form" class="space-y-4">
          <!-- Tipo -->
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Tipo de Movimentação</label>
            <select formControlName="tipo" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" [class.border-red-500]="form.get('tipo')?.invalid && form.get('tipo')?.touched">
              <option *ngFor="let t of tipos" [value]="t.value">{{ t.label }}</option>
            </select>
          </div>

          <!-- Produto -->
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Produto</label>
            <select formControlName="produtoId" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" [class.border-red-500]="form.get('produtoId')?.invalid && form.get('produtoId')?.touched">
              <option value="">Selecione o produto...</option>
              <option *ngFor="let p of produtos" [value]="p.id">{{ p.nome }} ({{ p.codigoInterno }})</option>
            </select>
            <p *ngIf="form.get('produtoId')?.invalid && form.get('produtoId')?.touched" class="text-[10px] text-red-500 mt-1 font-bold uppercase">Campo obrigatório</p>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <!-- Obra Origem (Saida e Transferencia) -->
            <div *ngIf="form.get('tipo')?.value != 1">
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Obra Origem</label>
              <select formControlName="obraOrigemId" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" [class.border-red-500]="form.get('obraOrigemId')?.invalid && form.get('obraOrigemId')?.touched">
                <option value="">Selecione...</option>
                <option *ngFor="let o of obras" [value]="o.id">{{ o.nome }}</option>
              </select>
              <p *ngIf="form.get('obraOrigemId')?.invalid && form.get('obraOrigemId')?.touched" class="text-[10px] text-red-500 mt-1 font-bold uppercase">Origem obrigatória</p>
            </div>

            <!-- Obra Destino (Entrada e Transferencia) -->
            <div *ngIf="form.get('tipo')?.value != 2">
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Obra Destino</label>
              <select formControlName="obraDestinoId" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" [class.border-red-500]="form.get('obraDestinoId')?.invalid && form.get('obraDestinoId')?.touched">
                <option value="">Selecione...</option>
                <option *ngFor="let o of obras" [value]="o.id">{{ o.nome }}</option>
              </select>
              <p *ngIf="form.get('obraDestinoId')?.invalid && form.get('obraDestinoId')?.touched" class="text-[10px] text-red-500 mt-1 font-bold uppercase">Destino obrigatório</p>
            </div>
          </div>

          <!-- Validação: Origem ≠ Destino em Transferência -->
          <div *ngIf="origemEqualsDestino" class="flex items-center gap-2 bg-red-50 border border-red-300 text-red-700 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wide">
            <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            A obra de origem e destino não podem ser iguais.
          </div>

          <div class="grid grid-cols-2 gap-4">
            <!-- Quantidade -->
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Quantidade</label>
              <input type="number" formControlName="quantidade" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" [class.border-red-500]="form.get('quantidade')?.invalid && form.get('quantidade')?.touched" placeholder="0.00">
              <p *ngIf="form.get('quantidade')?.invalid && form.get('quantidade')?.touched" class="text-[10px] text-red-500 mt-1 font-bold uppercase">Mínimo 0.01</p>
            </div>

            <!-- Valor Unitário -->
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Valor Unit. (R$)</label>
              <input type="number" formControlName="valorUnitario" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="0.00">
            </div>
          </div>
        </form>
      </div>

      <div class="bg-slate-50 px-6 py-4 sm:px-8 sm:flex sm:flex-row-reverse gap-3">
        <button (click)="save()" [disabled]="form.invalid || isSaving || origemEqualsDestino" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-lg px-6 py-2.5 bg-blue-600 text-sm font-bold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:w-auto disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-blue-200">
          <svg *ngIf="isSaving" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          {{ isSaving ? 'Salvando...' : 'Registrar Movimentação' }}
        </button>
        <button (click)="onClose.emit()" class="mt-3 w-full inline-flex justify-center rounded-xl border border-slate-200 shadow-sm px-6 py-2.5 bg-white text-sm font-bold text-slate-700 hover:bg-slate-50 focus:outline-none sm:mt-0 sm:w-auto transition-all">
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>
