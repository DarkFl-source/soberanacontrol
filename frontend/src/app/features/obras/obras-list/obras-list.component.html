<!-- Modal Overlay -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm" (click)="closeModal()">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 p-6" (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center mb-5">
      <h3 class="text-lg font-bold text-slate-800">Nova Obra</h3>
      <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div *ngIf="errorMessage" class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5">{{ errorMessage }}</div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Nome da Obra *</label>
        <input [(ngModel)]="novaObra.nome" type="text" placeholder="Ex: Residencial Jardim das Flores"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Endereço</label>
        <input [(ngModel)]="novaObra.endereco" type="text" placeholder="Ex: Rua das Flores, 123 - São Paulo, SP"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
      <button (click)="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 transition-colors">Cancelar</button>
      <button (click)="salvar()" [disabled]="isSaving"
        class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors disabled:opacity-60 flex items-center gap-2">
        <svg *ngIf="isSaving" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        {{ isSaving ? 'Salvando...' : 'Salvar Obra' }}
      </button>
    </div>
  </div>
</div>

<!-- Page -->
<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Obras e Almoxarifados</h2>
      <p class="text-slate-500 text-sm mt-1">Gerencie os locais físicos das obras</p>
    </div>
    <button (click)="openModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Nova Obra
    </button>
  </div>

  <div class="border rounded-lg overflow-hidden">
    <table class="w-full text-left text-sm text-slate-600">
      <thead class="bg-slate-50 text-slate-700 border-b">
        <tr>
          <th class="px-4 py-3 font-medium">Nome</th>
          <th class="px-4 py-3 font-medium">Endereço</th>
          <th class="px-4 py-3 font-medium text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        <tr *ngIf="isLoading">
          <td colspan="3" class="px-4 py-10 text-center text-slate-400">
            <div class="flex justify-center items-center gap-2">
              <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
              Carregando obras...
            </div>
          </td>
        </tr>
        <tr *ngIf="!isLoading && obras.length === 0">
          <td colspan="3" class="px-4 py-10 text-center text-slate-400">Nenhuma obra cadastrada.</td>
        </tr>
        <tr *ngFor="let obra of obras" class="hover:bg-slate-50 transition-colors">
          <td class="px-4 py-3 font-medium text-slate-800">{{ obra.nome }}</td>
          <td class="px-4 py-3 text-slate-500">{{ obra.endereco || '—' }}</td>
          <td class="px-4 py-3 text-right">
            <button class="text-blue-600 hover:underline text-sm font-medium">Ver Detalhes</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
