<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Catálogo de Produtos</h2>
      <p class="text-slate-500 text-sm mt-1">Gerencie os itens, preços médios e dados base</p>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
      + Novo Produto
    </button>
  </div>
  
  <div class="border rounded-lg overflow-hidden">
    <table class="w-full text-left text-sm text-slate-600">
      <thead class="bg-slate-50 text-slate-700 border-b">
        <tr>
          <th class="px-4 py-3 font-medium">Cód. Interno</th>
          <th class="px-4 py-3 font-medium">Nome / Descrição</th>
          <th class="px-4 py-3 font-medium text-right">Preço Médio (R$)</th>
          <th class="px-4 py-3 font-medium text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        <tr *ngIf="isLoading">
          <td colspan="4" class="px-4 py-8 text-center text-slate-500">
            Carregando produtos...
          </td>
        </tr>
        <tr *ngIf="!isLoading && produtos.length === 0">
          <td colspan="4" class="px-4 py-8 text-center text-slate-500">
            Nenhum produto encontrado.
          </td>
        </tr>
        <tr *ngFor="let prod of produtos" class="hover:bg-slate-50 transition-colors">
          <td class="px-4 py-3 font-medium text-slate-800">{{ prod.codigoInterno }}</td>
          <td class="px-4 py-3">{{ prod.nome }}</td>
          <td class="px-4 py-3 text-right">{{ prod.precoMedio | currency:'BRL' }}</td>
          <td class="px-4 py-3 text-right">
            <button class="text-blue-600 hover:underline text-sm font-medium">Ver Detalhes</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
